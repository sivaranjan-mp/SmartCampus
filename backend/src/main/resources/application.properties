# ─────────────────────────────────────────────
#  SmartCampus Backend — Application Config
# ─────────────────────────────────────────────

server.port=${PORT:8080}
server.servlet.context-path=/api

# Database (PostgreSQL / Supabase)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartcampus_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:c21hcnRjYW1wdXNfc3VwZXJfc2VjcmV0X2tleV9mb3Jfand0X3Rva2VuX3NpZ25pbmdfMjAyNA==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# OTP
app.otp.expiry-minutes=10
app.otp.max-attempts=3
app.otp.resend-cooldown-seconds=60

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB
app.upload.base-dir=${UPLOAD_DIR:uploads}
app.upload.max-file-size-mb=10

# App
app.name=SmartCampus
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.api-base-url=${API_BASE_URL:http://localhost:8080/api}

# Logging
logging.level.com.smartcampus=INFO
logging.level.org.springframework.security=WARN